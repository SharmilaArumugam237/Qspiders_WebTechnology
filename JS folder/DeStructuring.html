<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //ARRAY DESTRUCTURING...
        //NORMAL WAY.....INDEX VALUE
        let arr=[12,23,34,45,56]
        console.log(arr)
        console.log(arr[0])
        console.log(arr[3])
        console.log(arr[2])

        //BY DESTRUCTURING
        let arr1=["Sharmila",10,6n,"Aarthi"]
        console.log(arr1)

        let [a,b,c,d,e]=arr1
        console.log(a)
        console.log(e)

        //OBJECT DESTRUCTURING
        //NORMAL WAY........DOT NOTATION
        let obj={
            Name:"Sharmila",
            Age:21,
            City:"Chennai"
        }
        console.log(obj)
        console.log(obj.Name)

        //USING DESTRUCTURING
        let {Name,Age,City}=obj
        console.log(obj)
        console.log(Age)
        console.log(City)
    </script>
</body>
</html>
