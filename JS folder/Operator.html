<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //ARITHMETIC OPERATOR
        let a=60;
        let b=30;
        console.log(a+b)
        console.log(a-b)
        console.log(a*b)
        console.log(a/b)
        console.log(a%b)

        //COMPARISON OPERATOR
        let c=100
        let d=50
        console.log(c>d)
        console.log(c<d)
        console.log(c==d)        
        console.log(c>=d)
        console.log(c<=d)

        //LOGICAL OPERATOR
        //AND(&&)
        let p=300
        let q=100
        let r=p>q
        let s=p<q
        console.log(r && s)
        console.log(q<p && p>q)
        console.log(q>p && p>q)
        console.log(q>p && p<q)

        //OR(||)
        p=300
        q=100
        console.log(p>q || q<p)
        console.log(p>q || q<p)
        console.log(p==q || q<p)
        console.log(p==q || q>p)

        //NOT(!)
        console.log(p>q && !(q>p))
        console.log(!(q<p) && p>q)
        console.log(q<p || p>q)
        console.log(!(q<p) || p>q)

        //ASSIGNMENT OPERATRO
        let m =80
        let n=40
        console.log(m+=n)
        console.log(m-=n)
        console.log(m*=n)

        //TERNARY OPERATOR
        //CONDITION?VAL-1:VAL-2
        let x=500
        let y=300
        let big = x>y?x:y
        console.log(big)

        let small = x>y?y:x
        console.log(small)
        
    </script>
</body>
</html>
