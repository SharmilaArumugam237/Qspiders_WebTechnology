<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //ARRAY...
        let arr=[20,40,50,100,300,600,900]
        console.log(arr)

        //BY INDEX VALUE...
        console.log(arr[5])
        console.log(arr[6])

        //BY USING FILTER METHOD
        //VARIABLE.FILTER((VAL)=>(CONDITION))
        let x=arr.filter((b)=> b>300)
        console.log(x)

        let y=arr.filter(a=> a<40||a>600)
        console.log(y)

        let r=arr.filter(a=>a==100)
        console.log(r)

        let s=arr.filter(c=>c>300)                       
        console.log(s)

        let fruits=["Apple","Banana","Mango","Grapes","Watermelon"]
        console.log(fruits)

        //BY USING INDEX VALUE
        console.log(fruits[0])

        //BY USING FILTER METHOD
        let m =fruits.filter(a=> a =="Apple")
        console.log(m)

        let n=fruits.filter(b=> b=="Apple"|| b=="Grapes")
         console.log(n)

        let o=fruits.filter(c=> c<"Mango")
        console.log(o)

        let q=fruits.filter(d=> d<"Z")
        console.log(q)

    </script>
</body>
</html>
