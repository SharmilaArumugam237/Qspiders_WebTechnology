<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let arr=[30,60,90,120,150]
        console.log(arr)

        //BY USING INDEX VALUE
        console.log(arr[0])
        console.log(arr[2])

        //BY USING DESTRUCTURING
        let [a,b,c,d,e]=arr
        console.log(b)
        console.log(e)

        //MAP METHOD..
        //VARIABLE.MAP((VAL)=>PRINT(VAL))

        arr.map((a)=>console.log(a))

        let fruits=["Apple","Banana","Orange","Mango","Grapes"]
        console.log(fruits)

        fruits.map((a)=>console.log(a))
        


    </script>
</body>
</html>
