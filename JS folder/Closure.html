<body>
    <script>
        //CLOSURES IN JAVASCRIPT

        function outer(){
            let count=0;
            return function inner(){
                count++
                console.log(count)

            }
        }
        let counter=outer()
        counter()
        counter()
        counter()
        //.............................................................................//

        function OuterFunction(){
            let OuterVariable = "I am Outside...."
            function InnerFunction(){
                console.log(OuterVariable)
            }
            return InnerFunction
        }
        let closureExp=OuterFunction()
        closureExp()
        closureExp()
    </script>
