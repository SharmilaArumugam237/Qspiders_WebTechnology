<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //ARRAY
        let arr1=[10,20,30,40]
        console.log(arr1)

        let arr2=[50,60,70,80]
        console.log(arr2)

        //NORMAL WAY.....CREATING NEW ARRAY
        let arr3=[10,20,30,40,50,60,70,80]
        console.log(arr3)

        //BY USING SPREAD...
        let num1=[1,2,3,4]
        console.log(num1)

        let num2=[...num1,5,6,7,8]
        console.log(num2)

        let num3=[...num2,9,10]
        console.log(num3)

        //OBJECT..
        let obj1={
            Name:"Sharu",
            Age:21
        }
        console.log(obj1)

        let obj2={
            City:"Chennai",
            Country:"India"
        }
        console.log(obj2)
        //NORMAL.....BY CREATING NEW OBJECT

        let obj3={
            Name:"Sharu",
            Age:21,
            City:"Chennai",
            Country:"India"
        }
        console.log(obj3)

        //BY USING SPREAD OPERATOR
        let person1={
            Name:"Aarthi",
            Age:21
        }
        console.log(person1)

        let person2={
            ...person1,
           City:"Chennai",
           Country:"India"
        }
        console.log(person2)

        let person3={
            ...person2,
            ...arr2,
            Food:"Sambar"
        }
        console.log(person3)



    </script>
</body>
</html>
