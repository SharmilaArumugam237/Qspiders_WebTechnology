<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //FOR LOOP
        for(let i =0;i<10;i++){
            console.log(i)
        }
        //WHILE LOOP
        let m=40
        while(m<=45){
            console.log(m)
            m++
        }
        //do-while loop
        let x =30
        do{
            console.log(x)
            x++
        }while(x<=35)

        
        </script>
</body>
</html>
