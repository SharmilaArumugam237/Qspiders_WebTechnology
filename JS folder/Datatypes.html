<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //PRIMITIVE DATATYPES

        //STRING
        let a="Hello world"
        console.log(a)
        console.log(typeof a)

        //NUMBER
        let b = 50;
        console.log(b)
        console.log(typeof b)

        //BOOLEAN
        let c = true
        console.log(c)
        console.log(typeof c)

        //BIGINT
        let d = 8n
        console.log(d)
        console.log(typeof d)

        //UNDEFINED
        let e = undefined
        console.log(e)
        console.log(typeof e)

        //NULL
        let f = null
        console.log(f)
        console.log(typeof f)

        //SYMBOL
        let g = Symbol()
        console.log(g)
        console.log(typeof g)

        // NON-PRIMITIVE DATATYPES
        //ARRAY
        let arr = [30,10,"Raju",6n]
        console.log(arr)
        console.log(typeof arr)

        //OBJECT
        let obj = {
            Name:"Sharmila",
            Age:21,
            City:"Villupuram"
        }
        console.log(obj)
        console.log(typeof obj)

    </script>
</body>
</html>
