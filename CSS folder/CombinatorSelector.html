<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div p{
            color: aqua;
            background-color: black;
        }
        div>h1{
            color: yellow;
            background-color: green;
        }
        span>h1{
            color: plum;
            background-color: bisque;
        }
    </style>
</head>
<body>
    <div>
        <p>Chinnu</p>
        <p>Minnu</p>
        <span>
            <p>Bunny</p>
        </span>
        <span>
            <p>Bujji</p>
        </span>
    </div>
    <div>
        <h1>Kavya</h1>
        <h1>Navya</h1>
        <span>
            <h1>Bhavya</h1>
        </span>
        <span>
            <h1>Dhivya</h1>
        </span>
    </div>
</body>
</html>
