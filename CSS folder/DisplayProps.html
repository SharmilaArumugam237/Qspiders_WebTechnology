<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        span,img,video,input{
            display: block;
        }
        h1{
            height: 80px;
            width: 100px;
            border: 2px solid red;
        }
        h2{
            height: 100px;
            width: 100px;
            border: 2px solid blue;
        }
        h1,h2,p,div{
            display: inline;
        }
         h1,h2,p,div{
            display: inline-block;
        }
    </style>
</head>
<body>
    <!-- DISPLAY - BLOCK  -->
     <span>Hello world</span>
     <img src="mango.jpg" alt="">
     <video src="293519_medium.mp4" controls height="200px" width="200px"></video>
     <input type="text">
     <hr>

     <!-- DISPLAY - INLINE -->
    <h1>Kiruba</h1>
    <p>Hari</p>
    <div>Kailash</div>
    <h2>Tharun</h2>
</body>
</html>
