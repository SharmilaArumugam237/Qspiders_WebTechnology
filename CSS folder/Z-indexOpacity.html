<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-index Opacity</title>
</head>
<style>
    img{
        height: 200px;
        width: 400px;
        z-index: 40;
        position: relative;
        left: 100px;
        top: 100px;
        opacity: 0.8;
    }
    h1{
        z-index: 20;
        position: absolute;
        left: 300px;
        color: red;
        opacity: 1;
    }
</style>
<body>
    <img src="mango.jpg" alt="">
   <h1>Mango</h1>
</body>
</html>
