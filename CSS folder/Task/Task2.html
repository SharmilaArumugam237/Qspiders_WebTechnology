<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task2</title>
</head>
<style>
    #container{
        margin-left: 250px;
        margin-top: 100px;
        height: 400px;
        width: 1000px;
        
        border-radius: 25px;
        background-image: url(bg_image.jpg);
        background-repeat: no-repeat;
        background-size: cover;
    }
    .box{
        height: 300px;
        width: 250px;
        display: inline-block;
        margin: 20px;
        margin-top: 45px;
        margin-left: 45px;
        border-radius: 25px;
        box-shadow: 1px 1px 3px 6px rgb(70, 68, 68);
        background-color: #fff;
        
    }
    h1{
        text-align: center;
        padding-top: 20px;
        color: rgb(70, 68, 68);
        text-shadow: 1px 1px 2px gray;
    }
    h3{
        height: 30px;
        width: 100px;
        border: 2px solid rgb(46, 45, 45);
        text-align: center;
        margin-left: 65px;
        margin-top: 110px;
        padding-top: 5px;
        border-radius: 5px;
        background-color: rgb(144, 129, 240);
        color: white;
        /* box-shadow: 1px 1px 3px 6px rgb(70, 68, 68); */
    }
</style>
<body>
    <div id="container">
        <div class="box">
            <h1>Withdraw</h1>
            <h3>withdraw</h3>

        </div>
        <div class="box">
            <h1>Deposite</h1>
            <h3>deposite</h3>

        </div>
        <div class="box">
            <h1>Bank Balance</h1>
            <h3>balance</h3>

        </div>
    </div>
</body>
</html>
