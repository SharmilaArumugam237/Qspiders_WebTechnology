<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
             background-color: rgb(141, 141, 216);
        }
        img{
            height: 150px;
            width: 150px;
            margin-left: 10px;
            border-radius: 50%;
            animation-duration: 3s;
            animation-name: tech;
            animation-iteration-count: infinite;
           
        }
        @keyframes tech{
            20%{
                transform: translateX(900px);
            }
             40%{
                transform: translate(900px,300px);
            }
             60%{
                transform: translateY(300px);
            }
             80%{
                
            }
        }
    </style>
</head>
<body>
    <img src="../Task/tech.jpg" alt="">
</body>
</html>
