<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #demo1{
            height: 150px;
            width: 150px;
            background-image: linear-gradient(to bottom left,blue,yellow,red,aqua,green
            ,purple);
        }
        #demo2{
            height: 150px;
            width: 150px;
            background-image: repeating-linear-gradient(to top right, red 15%, yellow 20%, blue 25%,
            lightgreen,orange,black 25%);
        }
        #demo3{
            height: 150px;
            width: 150px;
            background-image: radial-gradient(red,yellow,blue,green,orange,
            purple,black,violet,brown);
        }
        #demo4{
            height: 150px;
            width: 150px;
            background-image: repeating-radial-gradient(red 20%,green 30%, skyblue,black,
            blue 50%,orange 20%);
        }
        #demo5{
            height: 150px;
            width: 150px;
            background-image: conic-gradient(red 0deg,yellow 90deg,blue 180deg, green 270deg,
            aqua 360deg);
        }
        #demo6{
            height: 150px;
            width: 150px;
            background-image:repeating-conic-gradient(blue 30deg 60deg,yellow 60deg 90deg,
            red 90deg 120deg,aqua 120deg 150deg);
        }
    </style>
</head>
<body>
    <!-- LINEAR GRADIENT -->
     <div id="demo1"></div>
     <hr>

     <!-- REPEATING LINEAR GRADIENT  -->
      <div id="demo2"></div>
      <hr>

      <!-- RADIAL GRADIENT  -->
       <div id="demo3"></div>
       <hr>

       <!-- REPEATING RADIAL GRADIENT  -->
        <div id="demo4"></div>
        <hr>

        <!-- CONIC GRADIENT  -->
         <div id="demo5"></div>
         <hr>

         <!-- REPEATING CONIC GRADIENT -->
          <div id="demo6"></div>
</body>
</html>
