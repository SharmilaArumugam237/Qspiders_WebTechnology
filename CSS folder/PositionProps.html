<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h2{
            position: absolute;
            left: 300px;
        }
        .cls{
            height: 100px;
            width: 100px;
            border: 2px solid black;

        }
        #demo1{
            background-color: red;
        }
         #demo2{
            background-color: blue;
            /* position: absolute;
            left: 300px; */

            position: relative;
            left: 300px;
        }
         #demo3{
            background-color: yellow;
        }
         #demo4{
            background-color: green;
        }
        #dem1{
            height: 100px;
            width: 120px;
            background-color: greenyellow;
        }
         #dem2{
            height: 100px;
            width: 1350px;
            background-color: rgb(20, 87, 133);
            position: fixed;
            top: 5px;
        }
         #dem3{
            height: 100px;
            width: 120px;
            background-color: rgb(192, 119, 24);
        }
         #dem4{
            height: 100px;
            width: 1000px;
            background-color: rgb(73, 6, 43);
        }
    </style>
</head>
<body>
    <!-- STATIC POSITION -->
     <h1>Shalini</h1>
     <h1>Sharmila</h1>
     <hr>

     <!-- ABSOLUTE POSITION  -->
      <h1>Aarthi</h1>
      <h2>Sandhya</h2>
      <p>Haritha</p>
      <h3>Keerthi</h3>
      <hr>
      <!-- RELATIVE POSITION  -->
      <div id="demo1" class="cls"></div>
      <div id="demo2" class="cls"></div>
      <div id="demo3" class="cls"></div>
      <div id="demo4" class="cls"></div>
      <hr>

      <!-- FIXED  POSITION  -->
       <div id="dem1" ></div>
      <div id="dem2" ></div>
      <div id="dem3" ></div>
      <div id="dem4" ></div>

</body>
</html>
