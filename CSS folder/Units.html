<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #demo1{
            height: 100px;
            width: 100px;
            border: 2px solid black;
            background-color: red;
        }
        #demo2{
            height: 150px;
            width: 40%;
            border: 2px solid black;
            background-color: blue;
        }
        #demo3{
            height: 10em;
            width: 10em;
            background-color: yellow;
            border: 2px solid black;
        }
        #demo4{
            height: 30rem;
            width: 30rem;
            background-color: green;
            border: 2px solid black;
        }
        #demo5{
            height: 30vh;
            width: 30vh;
            background-color: violet;
            border: 2px solid black;

        }
        #demo6{
            height: 30vw;
            width: 30vw;
            background-color: orangered;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <!-- PX -->
    <div id="demo1"></div>
<hr>
    <!-- % -->
     <div id="demo2"></div>
     <hr>
     <!-- em  -->
     <div id="demo3"></div>
     <hr>
     <!-- rem -->
      <div id="demo4"></div>
      <hr>
      <!-- vh -->
       <div id="demo5"></div>
       <hr>
       <!-- vr -->
        <div id="demo6"></div>
</body>
</html>
