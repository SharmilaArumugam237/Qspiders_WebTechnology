<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            margin-top: 100px;
            margin-left: 350px;
            border-radius: 15px;

            filter: blur(4px);
             filter: blur(2px);
             filter: blur(1.2px);
             filter: blur(1px);

             filter: grayscale(70%);
             filter: grayscale(120%);
             filter: grayscale(150%);

             filter: invert(70%);
             filter: invert(90%);
             filter: invert(150%);
                       
             filter: brightness(1);
             filter: brightness(3);

             filter: contrast(30%);
             filter: contrast(70%);
             filter: contrast(170%);

             filter: hue-rotate(60deg);
             filter: hue-rotate(100deg);
             filter: hue-rotate(250deg);

             filter: sepia(50%);
             filter: sepia(70%);
             filter: sepia(120%);

             filter: saturate(45%);
             
             filter: drop-shadow(2px 2px 6px black);
            
        }
    </style>
</head>

    <img src="../CSS folder/Task/tech.jpg" alt="">
