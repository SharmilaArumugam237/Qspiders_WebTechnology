<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Page</title>
</head>
<body>
    <form action="">
        <fieldset style="color: green;">
            <legend>Form Page</legend>
            <label for="">Name : </label>
            <input type="text">
            <br><br>
            <label for="">Email : </label>
            <input type="email">
            <br><br>
            <label for="">Phone No : </label>
            <input type="tel">
            <br><br>
            <label for="">Gender : </label>
            <input type="radio" name="Gender" id=""> Male
            <input type="radio" name="Gender" id=""> Female
            <br><br>
            <label for="">D.O.B : </label>
            <input type="date">
            <br><br>
            <label for="">Age : </label>
            <input type="number">
            <br><br>
            <label for="">Years Of Experience : </label>
            <input type="number">
            <br><br>
            <label for="">Choose Role : </label>
            <select name="" id="">
                <option value="" hidden>Select Role</option>
                <option value="">Developer</option>
                <option value="">System Engineer</option>
                <option value="">System Admin</option>
                <option value="">Tester</option>
                <option value="">Team Leader</option>
                <option value="">Manager</option>
            </select>
            <br>
            <br>
            <label for="">Upload Your Resume : </label>
            <input type="file">
            <br><br>
            <input type="reset" style="color: blue;"> &numsp; 
            <input type="submit" style="color: red;">
        </fieldset>
    </form>
    <br><br>
    <a href="NewForm.html"><button>Next</button></a> &numsp;
    <a href="Final.html"><button>Final</button></a>
</body>
</html>
