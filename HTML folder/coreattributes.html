<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Attributes</title>
    <style>
        #demo1{
            text-align: center;
            color: red;
            background-color: yellow;
        }
        #demo2{
            text-align: center;
            color: white;
            background-color: black;
        }
        #demo3{
            text-align: center;
            color: black;
            background-color: plum;
        }
        #demo4{
            text-align: center;
            color: orange;
            background-color: green;
        }
        .cls{
            color: white;
            background-color: rgb(36, 36, 241);
            font-style: italic;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- CORE ATTRIBUTES IN HTML -->
     <!-- ID  (#) -->
      <h1 id="demo1">HTML</h1>
      <h1 id="demo2">CSS</h1>
      <h1 id="demo3">JS</h1>
      <h1 id="demo4">React</h1>
      <hr>
      
      <!-- CLASS (.) -->
       <div class="cls">
       <h1 >Hello Guys....😎</h1>
       <p >Good Morning 😁, Nice to meet you🤞</p>
       </div>

       <!-- TITLE -->
        <h1 title="tamil"> வணக்கம்</h1>

</body>
</html>
