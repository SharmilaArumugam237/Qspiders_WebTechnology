<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form in HTML</title>
</head>
<body>
    <form action="./FormNew.html" target="_blank">
        <fieldset>
            <legend style="text-align: center;">Casual Form</legend>
            <label for="">Name : </label> 
            <input type="text" placeholder="Enter your name" name="name" value="Sharmila" minlength="8"
            maxlength="16" readonly>
            <br><br>
           <label for="">Password : </label>
            <input type="password" placeholder="Enter valid password"name="password" required size="30px">
            <br><br>
            <label for="">Email : </label>
            <input type="email" placeholder="Enter your emai" value="arthi@gmail.com">
            <br><br>
            <label for="">Age : </label>
            
            <input type="number" name="age" required min="18" max="35" step="2">     
            <br><br>
            <label for="">Phone</label>
            <input type="tel" pattern="[0-9]{10}">
            <br><br>      
            <input type="reset"> &numsp;
            <input type="submit"> &numsp;
            <input type="button" value="Save">
            <br><br>
            <label for="">Color : </label>
            <input type="color"><br><br>
            <label for="">Range : </label>
            <input type="range"> <br> <br>
            <label for="">Gender : </label>
            <input type="radio"name="gender" disabled>Male
            <input type="radio"name="gender">Female
            <br><br>
            <label for="">Languages : </label>
            <input type="checkbox">Tamil
            <input type="checkbox" checked>English
            <input type="checkbox">Hindi
            <br><br>
            <label for="">Browse : </label>
            <input type="search">
            <br><br>
            <label for="">Enter URL : </label>
            <input type="url"><br><br>
            <label for="">Select File :</label>
            <input type="file"> <br> <br>
            <label for="">Date : </label>
            <input type="date"> <br> <br>

            <label for="">Time : </label>
            <input type="time"> <br> <br>
            <label for="">Week : </label>
            <input type="week"> <br> <br>
            <label for="">Month : </label>
            <input type="month"> <br> <br>
            <label for="">Local Date : </label>
            <input type="datetime-local"><br><br>
            <label for="">Country : </label>
            <select name="" id="">
                <option  hidden>Select country</option>
                <option value="">INDIA</option>
                <option value="">SRILANKA</option>
                <option value="">CANADA</option>
                <option value="">PAKISTAN</option>
                <option value="">USA</option>
                <option value="">RUSSIA</option>
                <option value="">CHINA</option>
            </select>
            <br><br>
            <label for="">Address</label>
            <textarea ></textarea>
            <br><br>
        </fieldset>
    </form>
    
</body>
</html>
