<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <!-- TEXT TO LINK -->
     <h1>Converting Text to Link</h1>
    <a href="https://www.amazon.com/gp/css/homepage.html">Amazon</a>
    <a href="https://www.flipkart.com/mobile-apps">Flipkart</a>
    <a href="https://www.meesho.com/account">Meesho</a>
    <a href="https://www.myntra.com/shop/women">Myntra</a>
    <a href="https://www.shopsy.co.in/">Shopsy</a>
    <hr>
    <!-- IMAGE TO LINK -->
     <h1>Converting Image to Link</h1>
    <a href="https://www.britania.com/"><img src=".//bourbon.jpg" alt="" height="200px" width="200px"></a>
    <a href="https://www.britania.com/"><img src=".//darkfantasy.jpg" alt=""height="200px" width="200px"></a>
    <a href="https://www.britania.com/"><img src=".//jimjam.jpg" alt=""height="200px" width="200px"></a>
    <a href="https://www.cadbury.com/"><img src=".//oreo.jpg" alt=""height="200px" width="200px"></a>
    <a href="https://www.parle.com/"><img src=".//parleg.jpg" alt=""height="200px" width="200px"></a>
    <hr>
    <!-- LOGO/ICON TO LINK -->
     <h1>Converting Logo or Icon to Link</h1>
    <a href="https://www.facebook.com/"><i class="fa-brands fa-facebook"></i></a>
    <a href="https://www.facebook.com/"><i class="fa-brands fa-linkedin"></i></a>
    <a href="https://www.facebook.com/"><i class="fa-brands fa-youtube"></i></a>
    <a href="https://www.facebook.com/"><i class="fa-brands fa-github"></i></a>
    <a href="https://www.facebook.com/"><i class="fa-brands fa-twitter"></i></a>
    
</body>
</html>
