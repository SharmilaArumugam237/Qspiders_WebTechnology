<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        label{
            color: red;
        }
        #result{
            color: blue;
        }
        button{
            background-color: black;
            color: white;
            border-radius: 5px;
        }
        input,strong{
            color: green;
        }
    </style>
</head>
<body>
    <label for="">Enter First Number :</label>
    <input type="number" id="number1"> <br><br>
    <label for="">Enter Second Number :</label>
    <input type="number" id="number2"> <br><br>
    <button onclick="Addition()">ADD</button>
    <button onclick="Subraction()">SUB</button>
    <button onclick="Multiplication()">MUL</button>
    <button onclick="Division()">DIV</button> <br><br>

    <label for="" id="result">FINAL RESULT :</label>
    <strong id="output"></strong>

    <script>
        function Addition(){
            var num1 = document.getElementById("number1").value
            var num2 = document.getElementById("number2").value
            let Add=parseInt(num1)+parseInt(num2)
            document.getElementById("output").innerHTML=Add
        }
         function Subraction(){
            var num1 = document.getElementById("number1").value
            var num2 = document.getElementById("number2").value
            let Sub=num1-num2
            document.getElementById("output").innerHTML=Sub
        }
         function Multiplication(){
            var num1 = document.getElementById("number1").value
            var num2 = document.getElementById("number2").value
            let Mul=num1*num2
            document.getElementById("output").innerHTML=Mul
        }
         function Division(){
            var num1 = document.getElementById("number1").value
            var num2 = document.getElementById("number2").value
            let Div=num1/num2
            document.getElementById("output").innerHTML=Div
        }
    </script>
</body>
</html>
